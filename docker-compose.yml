version: "3.9"

services:

  corporateflow:

    container_name: corporateflow-app

    build:
      context: .
      dockerfile: Dockerfile

    env_file:
      - .env

    volumes:

      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
      - ./backups:/app/backups

    healthcheck:

      test:
        [
          "CMD",
          "python",
          "scripts/healthcheck.py"
        ]

      interval: 30s

      timeout: 10s

      retries: 3

      start_period: 20s


    restart: unless-stopped

    command:
      python main.py